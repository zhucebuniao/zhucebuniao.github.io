<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;450;500;600&family=Ma+Shan+Zheng&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body class="{% if page.url contains '/dreams' %}page-dream{% elsif page.url contains '/travels' %}page-travel{% elsif page.url contains '/novel' %}page-novel{% elsif page.url contains '/diary' %}page-diary{% endif %}">
  <div class="grain" aria-hidden="true"></div>
  <div class="page">
    <header class="top">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-moon">🌙</span>
        <span class="logo-text">梦与远方</span>
      </a>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">首页</a>
        <a href="{{ '/dreams' | relative_url }}" class="nav-link {% if page.url contains '/dreams' %}active{% endif %}">梦</a>
        <a href="{{ '/travels' | relative_url }}" class="nav-link {% if page.url contains '/travels' %}active{% endif %}">游记</a>
        <a href="{{ '/novel' | relative_url }}" class="nav-link {% if page.url contains '/novel' %}active{% endif %}">小说</a>
        <a href="{{ '/diary' | relative_url }}" class="nav-link {% if page.url contains '/diary' %}active{% endif %}">日记</a>
        <a href="{{ '/about' | relative_url }}" class="nav-link {% if page.url contains '/about' %}active{% endif %}">关于</a>
      </nav>
    </header>

    <main class="main">
      {{ content }}
    </main>

    <footer class="bottom">✦</footer>
  </div>
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
