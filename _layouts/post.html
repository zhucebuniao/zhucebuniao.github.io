---
layout: default
---
<article class="post-page">
  <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
    {{ page.date | date: "%Y 年 %m 月 %d 日" }}
  </time>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-tag">{{ page.category }}</div>
  <div class="post-body">
    {{ content }}
  </div>
  <nav class="post-nav">
    {% if page.previous.url %}
      <a href="{{ page.previous.url | relative_url }}" class="post-nav-link prev">← 前一篇</a>
    {% endif %}
    {% if page.next.url %}
      <a href="{{ page.next.url | relative_url }}" class="post-nav-link next">后一篇 →</a>
    {% endif %}
  </nav>
</article>
