<div class="about-body">
  <span class="about-mark">关于</span>
  <p>这里是一个写给自己看的角落。</p>
  <p>白天去远方，夜里做奇怪又温柔的梦。<strong>梦</strong>是凌晨醒来随手记下的，<strong>游记</strong>是想把去过的地方留下点什么，<strong>小说</strong>是在讲一个关于灯塔、海和母亲的故事，<strong>日记</strong>是田里的事和心里的话。</p>
  <p>没有什么宏大的目的，只是不想让那些转瞬即逝的东西就这么散掉。如果你偶然路过，恰好读到了某一段，那就当我们也在某个瞬间，有过一点交集。</p>
  <p>✦</p>
</div>
