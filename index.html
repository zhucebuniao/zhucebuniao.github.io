---
layout: default
title: "梦与远方"
---

<div class="entry-list">
  {% assign sorted = site.posts | sort: 'date' | reverse %}
  {% for post in sorted limit:30 %}
    <a href="{{ post.url | relative_url }}" class="entry">
      <span class="entry-dot {{ post.category }}"></span>
      <div class="entry-body">
        <div class="entry-date">{{ post.date | date: "%Y 年 %m 月 %d 日" }}</div>
        <div class="entry-title">{{ post.title }}</div>
      </div>
    </a>
  {% endfor %}
</div>

{% assign count = site.posts | size %}
{% if count == 0 %}
  <div class="empty">还没有内容 ✦</div>
{% endif %}
